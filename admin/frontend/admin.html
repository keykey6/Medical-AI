<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 — 医疗AI智能客服</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/admin/css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="admin-layout" id="adminApp" style="display:none">

  <!-- Topbar -->
  <header class="admin-topbar">
    <div class="topbar-brand">
      <i class="fa-solid fa-shield-halved"></i> 管理后台
    </div>
    <div class="topbar-right">
      <span class="admin-name" id="adminName"></span>
      <button class="btn-icon" onclick="doLogout()" title="退出登录">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </div>
  </header>

  <div class="admin-main">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <nav class="admin-nav">
        <a class="nav-item active" data-panel="dashboard" onclick="switchAdminPanel('dashboard')">
          <i class="fa-solid fa-chart-pie"></i> 仪表盘
        </a>
        <a class="nav-item" data-panel="sessions" onclick="switchAdminPanel('sessions')">
          <i class="fa-solid fa-comments"></i> 会话分析
        </a>
        <a class="nav-item" data-panel="compliance" onclick="switchAdminPanel('compliance')">
          <i class="fa-solid fa-shield-halved"></i> 合规监控
        </a>
        <a class="nav-item" data-panel="qos" onclick="switchAdminPanel('qos')">
          <i class="fa-solid fa-gauge-high"></i> 服务质量
        </a>
        <a class="nav-item" data-panel="system" onclick="switchAdminPanel('system')">
          <i class="fa-solid fa-server"></i> 系统运维
        </a>
      </nav>
    </aside>

    <!-- Content Area -->
    <div class="admin-content">

      <!-- ═══════════ Dashboard Panel ═══════════ -->
      <section class="panel active" id="panel-dashboard">
        <h2 class="panel-title">仪表盘概览</h2>
        <div class="stat-cards" id="statCards"></div>
        <div class="chart-grid">
          <div class="chart-card">
            <div class="chart-card-header">近7日对话趋势</div>
            <div class="chart-body"><canvas id="chartTrend"></canvas></div>
          </div>
          <div class="chart-card">
            <div class="chart-card-header">消息类型分布</div>
            <div class="chart-body"><canvas id="chartMsgType"></canvas></div>
          </div>
        </div>
      </section>

      <!-- ═══════════ Sessions Panel ═══════════ -->
      <section class="panel" id="panel-sessions">
        <h2 class="panel-title">会话分析</h2>
        <div class="stat-cards" id="sessionStatCards"></div>
        <div class="chart-grid">
          <div class="chart-card">
            <div class="chart-card-header">会话消息深度分布</div>
            <div class="chart-body"><canvas id="chartDepth"></canvas></div>
          </div>
          <div class="chart-card">
            <div class="chart-card-header">近24小时会话活跃</div>
            <div class="chart-body"><canvas id="chartHourly"></canvas></div>
          </div>
        </div>
      </section>

      <!-- ═══════════ Compliance Panel ═══════════ -->
      <section class="panel" id="panel-compliance">
        <h2 class="panel-title">合规监控</h2>
        <div class="stat-cards" id="complianceStatCards"></div>
        <div class="chart-card">
          <div class="chart-card-header">拦截类型分布</div>
          <div class="chart-body"><canvas id="chartCompliance"></canvas></div>
        </div>
      </section>

      <!-- ═══════════ QoS Panel ═══════════ -->
      <section class="panel" id="panel-qos">
        <h2 class="panel-title">服务质量</h2>
        <div class="stat-cards" id="qosStatCards"></div>
        <div class="chart-card">
          <div class="chart-card-header">报告类型分布</div>
          <div class="chart-body"><canvas id="chartReportTypes"></canvas></div>
        </div>
      </section>

      <!-- ═══════════ System Panel ═══════════ -->
      <section class="panel" id="panel-system">
        <h2 class="panel-title">系统运维</h2>
        <div class="health-grid" id="healthGrid"></div>
        <div class="chart-card mt-md">
          <div class="chart-card-header">系统配置（脱敏）</div>
          <div class="table-wrap"><table class="data-table" id="configTable"></table></div>
        </div>
      </section>

    </div>
  </div>
</div>

<!-- Login overlay (shown when not authenticated) -->
<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <div class="login-header">
      <div class="icon"><i class="fa-solid fa-shield-halved"></i></div>
      <h1>管理后台</h1><p>医疗AI智能客服系统</p>
    </div>
    <form onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label class="form-label">管理员账号</label>
        <input class="form-input" id="loginUser" placeholder="输入管理员账号" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input class="form-input" id="loginPass" type="password" placeholder="输入密码">
      </div>
      <button class="btn-login" type="submit" id="loginBtn">登 录</button>
    </form>
    <div class="error-msg" id="loginError"></div>
    <div class="back-link mt-sm"><a href="http://localhost:8000/static/index.html">&larr; 返回主应用</a></div>
  </div>
</div>

<script src="/admin/js/auth.js"></script>
<script src="/admin/js/admin.js"></script>
<script src="/admin/js/charts.js"></script>
<script>
if (localStorage.getItem('admin_token')) {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('adminApp').style.display = '';
  document.getElementById('adminName').textContent = localStorage.getItem('admin_username') || 'Admin';
  loadDashboard();
  startAutoRefresh();
}
</script>
</body>
</html>
